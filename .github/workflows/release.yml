name: Release

# Builds the Windows NSIS installer + updater artifacts (latest.json + .sig) and
# publishes them to a GitHub Release whenever a v* tag is pushed.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of ~/.tauri/iskariel_updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  contents of ~/.tauri/iskariel_updater.password.txt
# Also: Settings → Actions → General → Workflow permissions = Read and write.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Iskariel ${{ github.ref_name }}'
          releaseBody: |
            Iskariel ${{ github.ref_name }}.

            Install or update in-app from Settings ▸ System (or accept the on-launch prompt).
            The installer is not yet code-signed — Windows SmartScreen may warn; click More info → Run anyway.
          releaseDraft: false
          prerelease: false
